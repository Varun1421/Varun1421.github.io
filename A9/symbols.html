<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Proportional Symbols Map</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    h2 {
      margin: 12px;
    }

    a {
      margin-left: 12px;
    }

    #map {
      height: 90vh;
      width: 100%;
    }

    .d3-overlay {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      overflow: visible;
    }

    circle {
      pointer-events: all;
      cursor: pointer;
    }

    #tooltip {
      position: absolute;
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 8px 12px;
      font: 14px sans-serif;
      pointer-events: none;
      display: none;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <h2>Expensive States Proportional Symbols Map</h2>
  <a href="index.html">← Back</a>

  <div id="map"></div>
  <div id="tooltip"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script src="./js/symbols.js"></script>
</body>
</html>
